name: Deploy

on:
  push:
    branches: [main]

# Never run two production deploys at the same time; queue the second one.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── CMS (Payload / Next / OpenNext) ─────────────────────────────────────
      - name: Build CMS
        run: bun run build
        working-directory: apps/cms
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - name: Set CMS PAYLOAD_SECRET
        run: echo "${{ secrets.PAYLOAD_SECRET }}" | bunx wrangler secret put PAYLOAD_SECRET
        working-directory: apps/cms
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy CMS
        run: bunx wrangler deploy
        working-directory: apps/cms
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ── Web (Astro) ───────────────────────────────────────────────────────────
      - name: Build Web
        run: bun run build
        working-directory: apps/web
        env:
          PUBLIC_PAYLOAD_API_URL: https://schnitzel-cms.${{ secrets.CF_WORKERS_SUBDOMAIN }}.workers.dev/api

      - name: Deploy Web
        run: bunx wrangler deploy
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
