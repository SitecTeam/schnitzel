name: Preview Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel the previous preview run for this PR when a new push comes in.
concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── CMS ──────────────────────────────────────────────────────────────────
      - name: Build CMS
        run: bun run build
        working-directory: apps/cms
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - name: Set CMS Preview PAYLOAD_SECRET
        run: echo "${{ secrets.PAYLOAD_SECRET }}" | bunx wrangler secret put PAYLOAD_SECRET --name schnitzel-cms-pr-${{ github.event.pull_request.number }}
        working-directory: apps/cms
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy CMS Preview
        run: bunx wrangler deploy --name schnitzel-cms-pr-${{ github.event.pull_request.number }}
        working-directory: apps/cms
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Build Web
        run: bun run build
        working-directory: apps/web
        env:
          PUBLIC_PAYLOAD_API_URL: https://schnitzel-cms-pr-${{ github.event.pull_request.number }}.${{ secrets.CF_WORKERS_SUBDOMAIN }}.workers.dev/api

      - name: Deploy Web Preview
        # PUBLIC_PAYLOAD_API_URL is already baked into the build above.
        run: bunx wrangler deploy --name schnitzel-web-pr-${{ github.event.pull_request.number }}
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ── Post PR comment ───────────────────────────────────────────────────────
      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        env:
          CF_WORKERS_SUBDOMAIN: ${{ secrets.CF_WORKERS_SUBDOMAIN }}
        with:
          script: |
            const pr = context.issue.number;
            const subdomain = process.env.CF_WORKERS_SUBDOMAIN;
            const webUrl  = `https://schnitzel-web-pr-${pr}.${subdomain}.workers.dev`;
            const adminUrl = `https://schnitzel-cms-pr-${pr}.${subdomain}.workers.dev/admin`;

            const marker = '<!-- preview-deploy -->';
            const body = `${marker}
            ## Preview Deploy

            | | URL |
            |---|---|
            | Web | ${webUrl} |
            | CMS admin | ${adminUrl} |

            > Deleted automatically when this PR is closed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
